<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CardWars</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="lobby-screen" class="screen">
        <h1 class="logo">CARD WARS</h1>
        <div id="lobby-main" class="menu-box">
            <button class="menu-btn primary" onclick="showCreateForm()">НОВАЯ ИГРА</button>
            <div id="rooms-list"></div>
        </div>
        <div id="create-form" class="menu-box" style="display:none;">
            <input type="text" id="room-name" placeholder="НАЗВАНИЕ" class="mega-input">
            <input type="text" id="room-pass" placeholder="ПАРОЛЬ" class="mega-input">
            <div class="deck-row">
                <button id="d24" class="deck-btn" onclick="setDeckSize(24)">24</button>
                <button id="d36" class="deck-btn" onclick="setDeckSize(36)">36</button>
                <button id="d52" class="deck-btn active" onclick="setDeckSize(52)">52</button>
            </div>
            <button class="menu-btn success" onclick="confirmCreate()">СОЗДАТЬ</button>
            <button class="menu-btn cancel" onclick="hideCreateForm()">ОТМЕНА</button>
        </div>
    </div>

    <div id="game-container" style="display: none;">
        <div class="top-bar">
            <span>ВРАГ: 🎴 <span id="opp-count">0</span></span>
            <button class="exit-btn" onclick="exitToLobby()">ВЫХОД</button>
        </div>
        <div id="opp-board" class="battle-field"></div>
        <div id="turn-banner">...</div>
        <div id="my-board" class="battle-field"></div>
        <div id="player-hand" class="hand-zone"></div>
        <div class="bot-bar">
            <span>КОЛОДА: <span id="my-count">0</span></span>
            <button id="end-turn-btn" disabled>ХОД</button>
        </div>
    </div>

    <div id="end-screen" class="screen" style="display:none; background: rgba(0,0,0,0.9);">
        <div id="end-plaque" class="plaque">
            <h1 id="end-txt"></h1>
            <button class="menu-btn success" onclick="location.reload()">В МЕНЮ</button>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
